name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  project-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run project check
        run: npm run check

      - name: Run API smoke check
        run: npm run smoke:api

      - name: Run public preview smoke check
        run: npm run smoke:public

      - name: Validate deployment config
        run: npm run check:deploy-config
